name: WeatherBot

on:
  schedule:
    # Every 30 minutes
    - cron: "*/30 * * * *"
  workflow_dispatch:  # manual trigger from GitHub UI

permissions:
  contents: write  # needed to push DB + status back

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare config
        run: |
          cp config.template.json config.json
          python scripts/apply_paper_strategy.py

      - name: Bootstrap sigma (first run, or upgrade persistence-based calibration)
        run: |
          # Run when calibration is empty OR still contains v1 persistence-based
          # entries (sigmas inflated up to 17°F). The model-based bootstrap
          # replaces them with real forecast errors; the old
          # 'bootstrap_persistence' label disappears, so this runs once.
          python -c "
          from core.storage import load_calibration
          cal = load_calibration()
          stale = [k for k, v in cal.items() if v.get('source') == 'bootstrap_persistence']
          if cal and not stale:
              print(f'Calibration OK ({len(cal)} keys) — skipping bootstrap')
          else:
              why = 'empty' if not cal else f'{len(stale)} persistence keys to upgrade'
              print(f'Running model-based bootstrap ({why})...')
              import subprocess, sys
              sys.exit(subprocess.call([sys.executable, 'research/bootstrap_sigma.py']))
          "

      - name: Run bot (single cycle)
        env:
          VC_KEY: ${{ secrets.VC_KEY }}
          PK: ${{ secrets.PK }}
          FUNDER: ${{ secrets.FUNDER }}
          SIGNATURE_TYPE: ${{ secrets.SIGNATURE_TYPE }}
          # Force paper mode while live CLOB execution is blocked on hosted runners.
          PAPER_TRADING: "true"
        run: python main.py once

      - name: Commit updated state
        run: |
          git config user.name "weatherbot[bot]"
          git config user.email "weatherbot[bot]@users.noreply.github.com"
          # Back up fresh data files (bot just produced them)
          cp data/weatherbot.db /tmp/weatherbot.db.bak
          cp data/status.md /tmp/status.md.bak
          [ -f data/safety.json ] && cp data/safety.json /tmp/safety.json.bak
          # Fast-forward to whatever origin/master is now (handles concurrent pushes)
          git fetch origin master
          git reset --hard origin/master
          # Restore our fresh data on top of latest code
          mv /tmp/weatherbot.db.bak data/weatherbot.db
          mv /tmp/status.md.bak data/status.md
          [ -f /tmp/safety.json.bak ] && mv /tmp/safety.json.bak data/safety.json
          git add -f data/weatherbot.db data/status.md
          [ -f data/safety.json ] && git add -f data/safety.json
          # Only commit if there are changes
          git diff --cached --quiet || git commit -m "bot: update state $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
